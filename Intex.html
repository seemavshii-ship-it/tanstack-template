<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sylvarion — AI Agency of the Future</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #020408;
    --deep: #050c14;
    --surface: #0a1520;
    --panel: #0f1e2e;
    --gold: #c9a55a;
    --gold-light: #e8c97a;
    --gold-dim: #8a6e38;
    --silver: #8faab8;
    --silver-light: #c0d4e0;
    --white: #f0f4f8;
    --muted: #4a6070;
    --accent: #1a6b8a;
    --accent-bright: #26a0c8;
    --emerald: #1a7a5e;
    --glow: rgba(201,165,90,0.15);
    --glow-blue: rgba(38,160,200,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--void);
    color: var(--white);
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  #cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.3s, height 0.3s, opacity 0.3s;
    mix-blend-mode: screen;
  }
  #cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid rgba(201,165,90,0.4);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.25s ease-out, width 0.4s, height 0.4s, border-color 0.3s;
  }
  body:hover #cursor { opacity: 1; }

  /* Canvas BG */
  #bg-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1; opacity: 0.4;
  }

  /* Layout */
  .layer { position: relative; z-index: 2; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 28px 60px;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(2px);
    border-bottom: 1px solid transparent;
    transition: all 0.5s;
  }
  nav.scrolled {
    background: rgba(2,4,8,0.85);
    border-bottom-color: rgba(201,165,90,0.08);
    padding: 18px 60px;
    backdrop-filter: blur(16px);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--white);
  }
  .nav-logo span { color: var(--gold); }

  .nav-links {
    display: flex; gap: 40px; list-style: none;
  }
  .nav-links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--silver);
    text-decoration: none;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -3px; left: 0; right: 0; height: 1px;
    background: var(--gold);
    transform: scaleX(0); transform-origin: right;
    transition: transform 0.3s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }

  .nav-cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,165,90,0.4);
    padding: 10px 24px;
    cursor: pointer;
    background: transparent;
    transition: all 0.3s;
    text-decoration: none;
  }
  .nav-cta:hover {
    background: rgba(201,165,90,0.08);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,165,90,0.15);
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 40px 60px;
    position: relative;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    border: 1px solid rgba(201,165,90,0.2);
    padding: 8px 20px;
    margin-bottom: 48px;
    animation: fadeSlideUp 1s 0.2s both;
  }
  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 10vw, 9rem);
    font-weight: 300;
    line-height: 0.92;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    animation: fadeSlideUp 1s 0.4s both;
  }
  .hero-title .line-2 {
    font-style: italic;
    color: transparent;
    -webkit-text-stroke: 1px rgba(240,244,248,0.5);
  }
  .hero-title .line-3 { color: var(--gold); }

  .hero-sub {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--silver);
    max-width: 480px; margin: 0 auto 56px;
    line-height: 1.7;
    letter-spacing: 0.02em;
    animation: fadeSlideUp 1s 0.6s both;
  }

  .hero-actions {
    display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
    animation: fadeSlideUp 1s 0.8s both;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--void);
    border: none;
    padding: 16px 40px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-primary:hover::before { transform: translateX(100%); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(201,165,90,0.3); }

  .btn-ghost {
    background: transparent;
    color: var(--silver-light);
    border: 1px solid rgba(143,170,184,0.3);
    padding: 16px 40px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-ghost:hover {
    border-color: var(--silver-light);
    color: var(--white);
    background: rgba(143,170,184,0.05);
  }

  .hero-scroll {
    position: absolute; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: fadeSlideUp 1s 1.2s both;
  }
  .hero-scroll span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .scroll-line {
    width: 1px; height: 50px;
    background: linear-gradient(to bottom, var(--gold-dim), transparent);
    animation: scrollDrop 2s 2s infinite;
  }
  @keyframes scrollDrop {
    0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
  }

  /* MARQUEE */
  .marquee-section {
    border-top: 1px solid rgba(201,165,90,0.1);
    border-bottom: 1px solid rgba(201,165,90,0.1);
    padding: 18px 0;
    overflow: hidden;
    background: rgba(201,165,90,0.02);
  }
  .marquee-track {
    display: flex; gap: 0;
    animation: marquee 25s linear infinite;
    width: max-content;
  }
  .marquee-item {
    display: flex; align-items: center; gap: 28px;
    padding: 0 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .marquee-dot {
    width: 4px; height: 4px;
    background: var(--gold-dim);
    border-radius: 50%;
    flex-shrink: 0;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* SECTIONS */
  section { padding: 120px 60px; position: relative; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before {
    content: '';
    width: 30px; height: 1px;
    background: var(--gold-dim);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 5vw, 5rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }

  /* ABOUT / MISSION */
  .mission {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 100px; align-items: center;
    max-width: 1300px; margin: 0 auto;
  }

  .mission-text p {
    font-size: 1.05rem;
    color: var(--silver);
    line-height: 1.9;
    margin-bottom: 20px;
  }
  .mission-text strong { color: var(--white); font-weight: 600; }

  .mission-visual {
    position: relative; height: 420px;
  }
  .mission-card {
    position: absolute;
    background: var(--panel);
    border: 1px solid rgba(201,165,90,0.12);
    padding: 32px;
    transition: transform 0.4s;
  }
  .mission-card:hover { transform: translateY(-6px); }
  .mission-card:nth-child(1) { top: 0; left: 0; right: 20%; }
  .mission-card:nth-child(2) { bottom: 0; left: 20%; right: 0; }
  .mc-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }
  .mc-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .mc-desc {
    font-size: 0.9rem;
    color: var(--silver);
    line-height: 1.6;
  }

  /* SERVICES */
  .services-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: rgba(201,165,90,0.08);
    margin-top: 60px; max-width: 1300px; margin-left: auto; margin-right: auto;
  }
  .service-card {
    background: var(--void);
    padding: 50px 40px;
    position: relative; overflow: hidden;
    transition: background 0.4s;
    cursor: default;
  }
  .service-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: scaleX(0); transition: transform 0.5s;
  }
  .service-card:hover { background: var(--deep); }
  .service-card:hover::before { transform: scaleX(1); }

  .service-icon {
    width: 48px; height: 48px;
    margin-bottom: 28px;
    position: relative;
  }
  .service-icon svg { width: 100%; height: 100%; }

  .service-num {
    position: absolute; top: 40px; right: 40px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem; font-weight: 300;
    color: rgba(201,165,90,0.06);
    line-height: 1;
  }

  .service-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem; font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }
  .service-desc {
    font-size: 0.9rem;
    color: var(--silver);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .service-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    border: 1px solid rgba(201,165,90,0.2);
    padding: 4px 10px;
  }

  /* APPS SECTION */
  .apps-section { background: var(--deep); }
  .apps-section-inner { max-width: 1300px; margin: 0 auto; }
  .apps-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 30px; margin-top: 60px;
  }

  .app-card {
    border: 1px solid rgba(201,165,90,0.1);
    background: var(--surface);
    padding: 50px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
  }
  .app-card::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(201,165,90,0.08) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    transition: all 0.5s;
  }
  .app-card:hover { border-color: rgba(201,165,90,0.25); transform: translateY(-4px); }
  .app-card:hover::after { width: 400px; height: 400px; bottom: -200px; right: -200px; }

  .app-status {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 32px;
  }
  .app-status::before {
    content: ''; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .app-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem; font-weight: 300;
    margin-bottom: 16px; line-height: 1;
  }
  .app-tagline {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem; color: var(--silver);
    line-height: 1.7; margin-bottom: 36px;
    font-weight: 400;
  }
  .app-features {
    list-style: none; margin-bottom: 36px;
  }
  .app-features li {
    font-size: 0.85rem; color: var(--silver);
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; gap: 12px;
  }
  .app-features li::before {
    content: '→';
    color: var(--gold-dim); font-size: 0.8rem;
    flex-shrink: 0;
  }
  .app-cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;
    transition: gap 0.3s;
  }
  .app-cta:hover { gap: 18px; }

  /* WAITLIST */
  .waitlist-section {
    text-align: center;
    background: var(--surface);
    border-top: 1px solid rgba(201,165,90,0.1);
    border-bottom: 1px solid rgba(201,165,90,0.1);
  }
  .waitlist-inner { max-width: 640px; margin: 0 auto; }
  .waitlist-section .section-title { margin-bottom: 16px; }

  .waitlist-sub {
    color: var(--silver); font-size: 1rem;
    line-height: 1.7; margin-bottom: 48px;
  }

  .waitlist-form {
    display: flex; gap: 0;
    border: 1px solid rgba(201,165,90,0.25);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .waitlist-input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    padding: 18px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    color: var(--white);
  }
  .waitlist-input::placeholder { color: var(--muted); }
  .waitlist-btn {
    background: var(--gold);
    color: var(--void);
    border: none; padding: 18px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s;
    white-space: nowrap;
  }
  .waitlist-btn:hover { background: var(--gold-light); }

  .waitlist-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }

  .waitlist-count {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin-top: 40px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .wc-item {
    text-align: center; padding: 0 30px;
    border-right: 1px solid rgba(255,255,255,0.07);
  }
  .wc-item:last-child { border-right: none; }
  .wc-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem; font-weight: 300;
    color: var(--gold); display: block;
  }
  .wc-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted);
  }

  /* SUCCESS STATE */
  .waitlist-success {
    display: none;
    text-align: center; padding: 30px;
    border: 1px solid rgba(26,122,94,0.3);
    background: rgba(26,122,94,0.05);
  }
  .waitlist-success.show { display: block; }
  .ws-icon {
    font-size: 2.5rem; margin-bottom: 16px;
  }
  .ws-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 300;
    color: var(--white); margin-bottom: 8px;
  }
  .ws-text {
    font-size: 0.9rem; color: var(--silver);
  }

  /* PROCESS */
  .process-section { max-width: 1300px; margin: 0 auto; }
  .process-steps {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0; margin-top: 70px;
    border-top: 1px solid rgba(201,165,90,0.1);
    padding-top: 50px;
    position: relative;
  }
  .process-steps::before {
    content: '';
    position: absolute; top: -1px; left: 0;
    width: 25%; height: 2px;
    background: var(--gold);
    animation: lineGrow 2s 0.5s forwards;
    transform-origin: left;
    transform: scaleX(0);
  }
  @keyframes lineGrow {
    to { transform: scaleX(1); }
  }

  .step {
    padding: 0 40px 0 0;
    border-right: 1px solid rgba(255,255,255,0.04);
    margin-right: 40px;
  }
  .step:last-child { border-right: none; padding-right: 0; margin-right: 0; }

  .step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem; font-weight: 300;
    color: rgba(201,165,90,0.15); line-height: 1;
    margin-bottom: 20px; display: block;
  }
  .step-title {
    font-size: 1rem; font-weight: 700;
    margin-bottom: 12px; letter-spacing: 0.03em;
  }
  .step-desc {
    font-size: 0.85rem; color: var(--silver);
    line-height: 1.7;
  }

  /* FOOTER */
  footer {
    padding: 80px 60px 40px;
    border-top: 1px solid rgba(201,165,90,0.1);
    max-width: 1440px; margin: 0 auto;
  }
  .footer-top {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 60px; margin-bottom: 60px;
  }
  .footer-brand .nav-logo { font-size: 2rem; display: block; margin-bottom: 16px; }
  .footer-brand p {
    font-size: 0.85rem; color: var(--muted);
    line-height: 1.7; max-width: 280px;
  }
  .footer-col h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--gold-dim);
    margin-bottom: 20px;
  }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 10px; }
  .footer-col a {
    font-size: 0.88rem; color: var(--muted);
    text-decoration: none; transition: color 0.3s;
  }
  .footer-col a:hover { color: var(--white); }
  .footer-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 30px;
    border-top: 1px solid rgba(255,255,255,0.04);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
  }

  /* ANIMATIONS */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
